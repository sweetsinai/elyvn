version: '3.9'
services:
  bridge:
    build: ./server/bridge
    ports: ["3001:3001"]
    env_file: ./server/bridge/.env
    depends_on: [postgres]
  backend:
    build: ../elyvn-backend
    ports: ["3002:3001"]
    env_file: ../elyvn-backend/.env
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elyvn
      POSTGRES_USER: elyvn
      POSTGRES_PASSWORD: devpassword
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]
volumes:
  pgdata:
