<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>ELYVN Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden;background:#000}
canvas#bg{position:absolute;top:0;left:0;width:1080px;height:1920px;z-index:0}

.wrap{
  position:relative;z-index:2;width:1080px;height:1920px;
  display:flex;flex-direction:column;
  font-family:'Outfit',sans-serif;
  overflow:hidden;
}

/* Top fade */
.fade-top{position:absolute;top:0;left:0;right:0;height:400px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7) 0%,transparent 100%);z-index:3;}
.fade-bot{position:absolute;bottom:0;left:0;right:0;height:800px;
  background:linear-gradient(0deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.4) 50%,transparent 100%);z-index:3;}

/* Content layer */
.layer{position:relative;z-index:5;width:100%;height:100%;display:flex;flex-direction:column;padding:72px 64px;}

/* Logo row */
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:auto;}
.logo{font-size:20px;font-weight:600;letter-spacing:12px;color:rgba(255,255,255,0.25);text-transform:uppercase;}
.badge{
  padding:8px 22px;border-radius:100px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  font-size:12px;font-weight:600;letter-spacing:4px;color:rgba(255,255,255,0.4);text-transform:uppercase;
}

/* Middle: glass card */
.glass-card{
  margin:auto 0;padding:52px 56px;border-radius:36px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  backdrop-filter:blur(60px) saturate(1.6);-webkit-backdrop-filter:blur(60px) saturate(1.6);
  box-shadow:0 24px 80px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05);
}
.card-label{
  font-size:13px;font-weight:600;letter-spacing:5px;color:rgba(255,255,255,0.3);
  text-transform:uppercase;margin-bottom:28px;
}
.card-big{
  font-size:128px;font-weight:800;line-height:1;color:#fff;margin-bottom:4px;
  text-shadow:0 0 80px rgba(138,92,246,0.3);
}
.card-big span{
  background:linear-gradient(135deg,#a78bfa,#818cf8,#6366f1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.card-desc{font-size:22px;font-weight:400;color:rgba(255,255,255,0.35);letter-spacing:1px;}

/* Bottom text block */
.bottom{margin-top:auto;}
.headline{
  font-size:64px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:20px;
}
.headline em{
  font-style:normal;
  background:linear-gradient(135deg,#a78bfa,#818cf8,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{font-size:24px;font-weight:400;color:rgba(255,255,255,0.4);line-height:1.6;margin-bottom:44px;}

/* Pills */
.pills{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:44px;}
.pill{
  padding:14px 26px;border-radius:100px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  font-size:16px;font-weight:500;color:rgba(255,255,255,0.55);
  backdrop-filter:blur(20px);
}

/* CTA */
.cta{
  width:100%;padding:24px;border-radius:20px;text-align:center;
  background:linear-gradient(135deg,#7c3aed,#6366f1,#818cf8);
  font-size:22px;font-weight:700;color:#fff;letter-spacing:2px;
  box-shadow:0 16px 48px rgba(99,102,241,0.35);
}
.cta-sub{
  text-align:center;margin-top:14px;
  font-size:14px;font-weight:500;color:rgba(255,255,255,0.2);letter-spacing:3px;text-transform:uppercase;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <div class="fade-top"></div>
  <div class="fade-bot"></div>
  <div class="layer">
    <div class="top-row">
      <div class="logo">Elyvn</div>
      <div class="badge">We're Live</div>
    </div>

    <div class="glass-card">
      <div class="card-label">The problem</div>
      <div class="card-big"><span>62%</span></div>
      <div class="card-desc">of calls to small businesses go unanswered</div>
    </div>

    <div class="bottom">
      <div class="headline">Your AI<br><em>Receptionist</em><br>Is Here.</div>
      <div class="sub">Never miss a customer call again.<br>AI that answers, qualifies &amp; books — 24/7.</div>
      <div class="pills">
        <div class="pill">⚡ Instant Pickup</div>
        <div class="pill">📅 Auto-Booking</div>
        <div class="pill">💬 Smart Follow-Up</div>
      </div>
      <div class="cta">Book a Free Demo →</div>
      <div class="cta-sub">7 days free · elyvn.net</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// 3D scene with soft floating glass objects
const canvas = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setSize(1080,1920);
renderer.setPixelRatio(1);
renderer.setClearColor(0x050510);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050510, 0.04);
const camera = new THREE.PerspectiveCamera(45, 1080/1920, 0.1, 100);
camera.position.set(0, 0, 12);

// Lights — soft purple/blue tones
const amb = new THREE.AmbientLight(0x1a1030, 1);
scene.add(amb);

const p1 = new THREE.PointLight(0x7c3aed, 3, 25);
p1.position.set(4, 6, 5);
scene.add(p1);

const p2 = new THREE.PointLight(0x6366f1, 2.5, 25);
p2.position.set(-5, -3, 4);
scene.add(p2);

const p3 = new THREE.PointLight(0x818cf8, 1.5, 20);
p3.position.set(0, -8, 6);
scene.add(p3);

const p4 = new THREE.PointLight(0xa78bfa, 1, 15);
p4.position.set(-2, 4, 8);
scene.add(p4);

// Glass material
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xb4a0ff,
  metalness: 0.05,
  roughness: 0.05,
  transmission: 0.9,
  thickness: 2,
  transparent: true,
  opacity: 0.3,
  clearcoat: 1,
  clearcoatRoughness: 0.05,
  envMapIntensity: 1,
});

const glowMat = new THREE.MeshPhysicalMaterial({
  color: 0x7c3aed,
  metalness: 0.1,
  roughness: 0.1,
  transmission: 0.7,
  thickness: 2.5,
  transparent: true,
  opacity: 0.35,
  emissive: 0x4c1d95,
  emissiveIntensity: 0.4,
  clearcoat: 0.8,
});

const softMat = new THREE.MeshPhysicalMaterial({
  color: 0x60a5fa,
  metalness: 0.0,
  roughness: 0.15,
  transmission: 0.85,
  thickness: 1.5,
  transparent: true,
  opacity: 0.25,
  clearcoat: 1,
});

const objs = [];

// Main torus knot — center-right
const tk = new THREE.Mesh(new THREE.TorusKnotGeometry(2.2, 0.6, 200, 32), glowMat);
tk.position.set(2, 1, -3);
scene.add(tk);
objs.push({m:tk, rx:0.002, ry:0.004, rz:0.001, fy:1, fa:0.4, by:1});

// Large icosahedron — upper left
const ico = new THREE.Mesh(new THREE.IcosahedronGeometry(1.8, 1), glassMat);
ico.position.set(-3, 5, -2);
scene.add(ico);
objs.push({m:ico, rx:0.003, ry:0.005, rz:0.002, fy:0.5, fa:0.5, by:5});

// Octahedron — lower right
const oct = new THREE.Mesh(new THREE.OctahedronGeometry(1.2, 0), softMat);
oct.position.set(3.5, -5, -1);
scene.add(oct);
objs.push({m:oct, rx:0.004, ry:0.002, rz:0.005, fy:0.6, fa:0.35, by:-5});

// Torus — mid left
const tor = new THREE.Mesh(new THREE.TorusGeometry(1.3, 0.35, 32, 64), glassMat);
tor.position.set(-3.5, -2, -2);
tor.rotation.set(0.8, 0.3, 0);
scene.add(tor);
objs.push({m:tor, rx:0.002, ry:0.006, rz:0.003, fy:0.45, fa:0.3, by:-2});

// Dodecahedron — top right
const dod = new THREE.Mesh(new THREE.DodecahedronGeometry(0.9, 0), glowMat);
dod.position.set(2, 7, -1.5);
scene.add(dod);
objs.push({m:dod, rx:0.005, ry:0.003, rz:0.004, fy:0.55, fa:0.25, by:7});

// Sphere cluster
for(let i=0;i<12;i++){
  const r = 0.15 + Math.random()*0.35;
  const sp = new THREE.Mesh(
    new THREE.SphereGeometry(r, 24, 24),
    [glassMat, glowMat, softMat][Math.floor(Math.random()*3)]
  );
  sp.position.set(
    (Math.random()-0.5)*10,
    (Math.random()-0.5)*18,
    (Math.random()-0.5)*6 - 2
  );
  scene.add(sp);
  objs.push({
    m:sp,
    rx:0.002+Math.random()*0.006,
    ry:0.002+Math.random()*0.006,
    rz:0.001+Math.random()*0.004,
    fy:0.3+Math.random()*0.5,
    fa:0.1+Math.random()*0.3,
    by:sp.position.y
  });
}

let t=0;
function anim(){
  requestAnimationFrame(anim);
  t+=0.016;
  objs.forEach(o=>{
    o.m.rotation.x+=o.rx;
    o.m.rotation.y+=o.ry;
    o.m.rotation.z+=o.rz;
    o.m.position.y=o.by+Math.sin(t*o.fy)*o.fa;
  });
  camera.position.x=Math.sin(t*0.12)*0.4;
  camera.position.y=Math.cos(t*0.08)*0.3;
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}
anim();
</script>
</body>
</html>
