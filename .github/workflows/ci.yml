name: ELYVN CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/bridge/package-lock.json

      - name: Install dependencies
        run: cd server/bridge && npm ci

      - name: Run tests
        run: |
          cd server/bridge
          npx jest --forceExit --passWithNoTests --no-coverage
        env:
          NODE_ENV: test
          ANTHROPIC_API_KEY: test-key
          JWT_SECRET: test-jwt-secret-that-is-at-least-32-chars
          ENCRYPTION_KEY: test-encryption-key-at-least-32-chars-long
          ELYVN_API_KEY: test-api-key
          RETELL_WEBHOOK_SECRET: test-retell-secret-for-ci
          TWILIO_AUTH_TOKEN: test-twilio-auth-token-for-ci
          TWILIO_ACCOUNT_SID: ACtest123456789
          STRIPE_WEBHOOK_SECRET: whsec_test_stripe_secret_for_ci
          TELEGRAM_WEBHOOK_SECRET: test-telegram-secret-for-ci

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -rn "ghp_\|sk_live_\|AKIA" server/ dashboard/src/ \
            --include="*.js" --include="*.jsx" \
            --exclude="*test*" --exclude="*logger*" \
            --exclude-dir=node_modules 2>/dev/null; then
            echo "::error::FOUND HARDCODED SECRETS"
            exit 1
          fi
          echo "No hardcoded secrets found."

      - name: Check syntax of all JS files
        run: |
          cd server/bridge
          FAIL=0
          for f in $(find routes utils config jobs middleware -name "*.js" -not -path "*/node_modules/*" 2>/dev/null); do
            node --check "$f" 2>/dev/null || { echo "SYNTAX ERROR: $f"; FAIL=1; }
          done
          if [ "$FAIL" = "1" ]; then
            echo "::error::Syntax errors found"
            exit 1
          fi
          echo "All JS files pass syntax check."

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd server/bridge && npm ci

      - name: Audit dependencies (critical)
        run: |
          cd server/bridge
          npm audit --audit-level=critical --omit=dev 2>&1 || true
          echo "Dependency audit complete."

      - name: Check for hardcoded secrets (extended patterns)
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -rEn "(sk_live_|sk_test_|ghp_|AKIA|AIza[0-9A-Za-z_-]{35}|whsec_[a-zA-Z0-9]+)" \
            --include="*.js" --include="*.jsx" \
            --exclude="*test*" --exclude="*logger*" --exclude="*ci.yml" \
            --exclude-dir=node_modules \
            server/ dashboard/ 2>/dev/null; then
            echo "::error::Potential hardcoded secrets found!"
            exit 1
          fi
          echo "No hardcoded secrets found."

      - name: Check for dangerous patterns
        run: |
          echo "Checking for dangerous code patterns..."
          WARN=0
          # eval() in production code
          if grep -rn "eval(" --include="*.js" server/bridge/routes/ server/bridge/utils/ 2>/dev/null; then
            echo "::warning::eval() usage found — review for injection risk"
            WARN=1
          fi
          # SSL verification disabled
          if grep -rn "rejectUnauthorized.*false" --include="*.js" server/bridge/ 2>/dev/null; then
            echo "::warning::SSL verification disabled found"
            WARN=1
          fi
          # Unparameterized SQL (string concat with user input)
          if grep -rEn '(query|exec|prepare)\(.*\$\{' --include="*.js" server/bridge/routes/ 2>/dev/null; then
            echo "::warning::Potential SQL injection — template literal in query"
            WARN=1
          fi
          # Sensitive data in logs
          if grep -rn "password\|secret\|token" --include="*.js" server/bridge/utils/logger.js 2>/dev/null | grep -v "redact\|mask\|filter" 2>/dev/null; then
            echo "::warning::Potential sensitive data logging"
          fi
          echo "Pattern check complete."

      - name: OWASP dependency check
        run: |
          cd server/bridge
          # Check for known vulnerable packages
          npx better-npm-audit audit --level critical --production 2>/dev/null || true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test, lint, security]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dashboard deps
        run: cd dashboard && npm ci

      - name: Build dashboard
        run: cd dashboard && npm run build

      - name: Install server deps
        run: cd server/bridge && npm ci

      - name: Verify server syntax
        run: |
          cd server/bridge
          node --check index.js
          echo "Server entry point syntax OK"

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment
        run: sleep 30

      - name: Verify healthcheck
        run: |
          HEALTH_URL="${{ secrets.RAILWAY_URL }}/health"
          if [ -z "$HEALTH_URL" ] || [ "$HEALTH_URL" = "/health" ]; then
            echo "RAILWAY_URL secret not set — skipping healthcheck"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Healthcheck passed (attempt $i)"
              exit 0
            fi
            echo "Healthcheck attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "::error::Healthcheck failed after 5 attempts"
          exit 1
